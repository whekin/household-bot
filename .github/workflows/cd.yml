name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        ) &&
        secrets.GCP_PROJECT_ID != '' &&
        secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
        secrets.GCP_SERVICE_ACCOUNT != ''
      }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy bot service
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE_BOT || 'household-bot' }}" \
            --source . \
            --region "${{ vars.GCP_REGION || 'europe-west1' }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --quiet

  deploy-skipped:
    name: Deploy skipped (missing config)
    runs-on: ubuntu-latest
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        ) &&
        (
          secrets.GCP_PROJECT_ID == '' ||
          secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' ||
          secrets.GCP_SERVICE_ACCOUNT == ''
        )
      }}

    steps:
      - name: Print configuration hint
        run: |
          echo "CD skipped: configure required GitHub secrets."
          echo "Required: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT"
