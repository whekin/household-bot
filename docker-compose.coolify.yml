# Intended for a Coolify Git-based Docker Compose application.
# The build contexts assume Coolify has checked out this repository.
services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: '8080'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
      TELEGRAM_WEBHOOK_PATH: ${TELEGRAM_WEBHOOK_PATH:-/webhook/telegram}
      MINI_APP_URL: ${MINI_APP_URL:?MINI_APP_URL is required}
      MINI_APP_ALLOWED_ORIGINS: ${MINI_APP_ALLOWED_ORIGINS:?MINI_APP_ALLOWED_ORIGINS is required}
      SCHEDULER_SHARED_SECRET: ${SCHEDULER_SHARED_SECRET:?SCHEDULER_SHARED_SECRET is required}
      SCHEDULER_OIDC_ALLOWED_EMAILS: ${SCHEDULER_OIDC_ALLOWED_EMAILS:-}
      SCHEDULED_DISPATCH_PROVIDER: self-hosted
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PURCHASE_PARSER_MODEL: ${PURCHASE_PARSER_MODEL:-gpt-5.4-mini}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-gpt-5.4-mini}
      TOPIC_PROCESSOR_MODEL: ${TOPIC_PROCESSOR_MODEL:-gpt-4.1-nano}
      TOPIC_PROCESSOR_TIMEOUT_MS: ${TOPIC_PROCESSOR_TIMEOUT_MS:-10000}
      ASSISTANT_TIMEOUT_MS: ${ASSISTANT_TIMEOUT_MS:-20000}
      ASSISTANT_MEMORY_MAX_TURNS: ${ASSISTANT_MEMORY_MAX_TURNS:-12}
      ASSISTANT_RATE_LIMIT_BURST: ${ASSISTANT_RATE_LIMIT_BURST:-5}
      ASSISTANT_RATE_LIMIT_BURST_WINDOW_MS: ${ASSISTANT_RATE_LIMIT_BURST_WINDOW_MS:-60000}
      ASSISTANT_RATE_LIMIT_ROLLING: ${ASSISTANT_RATE_LIMIT_ROLLING:-50}
      ASSISTANT_RATE_LIMIT_ROLLING_WINDOW_MS: ${ASSISTANT_RATE_LIMIT_ROLLING_WINDOW_MS:-86400000}
    command:
      - /bin/sh
      - -lc
      - bun packages/db/dist/migrate.js && exec bun apps/bot/dist/index.js
    expose:
      - '8080'
    restart: unless-stopped

  miniapp:
    build:
      context: .
      dockerfile: apps/miniapp/Dockerfile
    environment:
      BOT_API_URL: ${BOT_API_URL:?BOT_API_URL is required}
    expose:
      - '80'
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    command: ['bun', 'apps/bot/dist/scheduler-runner.js']
    healthcheck:
      test: ['CMD', 'bun', '-e', 'process.exit(0)']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      NODE_ENV: production
      BOT_INTERNAL_BASE_URL: http://bot:8080
      SCHEDULER_SHARED_SECRET: ${SCHEDULER_SHARED_SECRET:?SCHEDULER_SHARED_SECRET is required}
      SCHEDULER_POLL_INTERVAL_MS: ${SCHEDULER_POLL_INTERVAL_MS:-60000}
      SCHEDULER_DUE_SCAN_LIMIT: ${SCHEDULER_DUE_SCAN_LIMIT:-25}
    depends_on:
      - bot
    restart: unless-stopped
